name: CI/CD Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-lint:
    name: Backend Linting (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UV package manager
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint with Ruff
        run: uv run ruff check . --output-format=github

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy main.py database.py canvas_sync.py

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UV package manager
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

  frontend-tests:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./canvas-react

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: canvas-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          VITE_API_ENDPOINT: 'https://placeholder.api.local'

      - name: Run tests
        run: npm test -- --passWithNoTests

  pre-commit-hooks:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend-tests, pre-commit-hooks]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Pipeline Summary:"
          echo "Backend lint: ${{ needs.backend-lint.result }}"
          echo "Backend tests: ${{ needs.backend-tests.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          echo "Pre-commit hooks: ${{ needs.pre-commit-hooks.result }}"

      - name: Report status
        if: |
          needs.backend-lint.result == 'failure' ||
          needs.backend-tests.result == 'failure' ||
          needs.frontend-tests.result == 'failure'
        run: |
          echo "❌ Some CI checks failed. Please review the logs."
          exit 1
