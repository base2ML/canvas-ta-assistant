version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ta-dashboard-backend
    ports:
      - "8000:8000"
    environment:
      - CANVAS_API_URL=${CANVAS_API_URL}
      - CANVAS_API_TOKEN=${CANVAS_API_TOKEN}
      - CANVAS_COURSE_ID=${CANVAS_COURSE_ID:-}
      - ENVIRONMENT=local
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./canvas-react
      dockerfile: Dockerfile
      args:
        - VITE_API_ENDPOINT=http://localhost:8000
    container_name: ta-dashboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  canvas-data:
